<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="circ">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Flag stripes clipped to circle -->
  <g clip-path="url(#circ)">
    <!-- Saffron top third -->
    <rect x="2" y="2" width="60" height="20" fill="#FF9933"/>
    <!-- White middle third -->
    <rect x="2" y="22" width="60" height="20" fill="#FFFFFF"/>
    <!-- Green bottom third -->
    <rect x="2" y="42" width="60" height="20" fill="#138808"/>
  </g>

  <!-- Circle border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ccc" stroke-width="1.5"/>

  <!-- Ashoka Chakra -->
  <g transform="translate(32,32)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#000080" stroke-width="1.5"/>
    <!-- Inner dot -->
    <circle cx="0" cy="0" r="1.2" fill="#000080"/>
    <!-- 24 spokes -->
    <g stroke="#000080" stroke-width="0.8">
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(0)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(15)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(30)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(45)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(60)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(75)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(90)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(105)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(120)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(135)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(150)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(165)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(180)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(195)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(210)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(225)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(240)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(255)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(270)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(285)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(300)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(315)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(330)"/>
      <line x1="0" y1="-1.2" x2="0" y2="-7.5" transform="rotate(345)"/>
    </g>
  </g>
</svg>
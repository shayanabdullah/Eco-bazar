<?xml version="1.0" encoding="iso-8859-1"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 512 512" style="enable-background:new 0 0 512 512;" xml:space="preserve">

  <!-- Transparent background circle (no fill) -->
  <circle style="fill:none;" cx="256" cy="256" r="256"/>

  <!-- Green circle background clipped to round shape -->
  <clipPath id="circleClip">
    <circle cx="256" cy="256" r="256"/>
  </clipPath>

  <!-- Green background -->
  <rect style="fill:#006A4E;" x="0" y="0" width="512" height="512" clip-path="url(#circleClip)"/>

  <!-- Red circle slightly left of center (as per real Bangladesh flag) -->
  <circle style="fill:#F42A41;" cx="236" cy="256" r="150"/>

</svg>